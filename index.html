<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Page</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 10px;
}

.price {
  font-size: 24px;
  color: green;
  margin: 15px 0;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #0a7cff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #095fd1;
}

.note {
  font-size: 12px;
  color: #777;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Premium Access</h2>
  <p>Unlock predictions & analytics</p>

  <div class="price">KES 100</div>

  <button onclick="payNow()">Pay Now</button>

  <p class="note">Secure payment powered by provider</p>
</div>

<script>
function payNow() {
    // 🔥 Replace with your real payment link
    const paymentLink = "https://pay.yourprovider.com/cbepayment";

    window.location.href = paymentLink;
}
</script>

</body>
</html>
