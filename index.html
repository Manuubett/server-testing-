<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PayNecta Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .success {
      margin-top: 15px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Test Payment</h2>

    <!-- Widget loads here -->
    <script>
      function handlePaySuccess(data) {
        console.log("✅ Payment Success:", data);

        document.getElementById("status").innerText =
          "Paid KES " + data.amount + " ✔️";
      }
    </script>

    <script src="https://paynecta.co.ke/widget.js"
      data-slug="cbepayment"
      data-on-success="handlePaySuccess">
    </script>

    <div id="status" class="success"></div>
  </div>

</body>
</html>
